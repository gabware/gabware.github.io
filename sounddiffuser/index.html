<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Diffuser Configurator</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="style.css">
    <!-- Import map for Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <header>
        <h1>Sound Diffuser Configurator</h1>
    </header>

    <nav id="mobile-tabs">
        <button class="tab-btn active" data-tab="preview">3D Preview</button>
        <button class="tab-btn" data-tab="config">Configuration</button>
        <button class="tab-btn" id="btn-ar-mobile">AR View</button>
    </nav>

    <main>
        <section id="preview-container" class="mobile-active">
            <div id="three-canvas-wrapper"></div>
        </section>

        <section id="configuration-panel">
            <h2>Configuration</h2>
            
            <div class="control-group">
                <h3>Dimensions</h3>
                <div class="config-card">
                    <div class="config-card-grid grid-3">
                        <div><label>Width (in)</label><input type="number" id="overall-width" value="48" step="1"></div>
                        <div><label>Height (in)</label><input type="number" id="overall-height" value="36" step="1"></div>
                        <div><label>Block (in)</label><input type="number" id="block-size" value="1.5" step="0.25"></div>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <h3>Block Configuration</h3>
                
                <label>Layout Type:
                    <select id="layout-type">
                        <option value="random" selected>Random Skyline</option>
                        <option value="wave">Simple Wave</option>
                        <option value="ripple">Simple Ripple</option>
                        <option value="parametric">Parametric Waves</option>
                    </select>
                </label>

                <!-- Random Skyline Settings -->
                <div id="settings-random">
                    <div id="block-configs-container"></div>
                    <button id="add-block-config">+ Add Block Type</button>
                    <div class="layout-actions">
                        <button id="randomize-layout" class="primary">Generate</button>
                    </div>
                    <div id="validation-message" style="color: red; font-size: 0.8rem; margin-top: 0.5rem;"></div>
                </div>

                <!-- Wave Settings -->
                <div id="settings-wave" style="display: none;">
                    <div id="wave-layers-container"></div>
                    <button id="add-wave-layer">+ Add Wave Layer</button>
                    <div class="config-card">
                        <div class="config-card-grid grid-3">
                            <div><label>Min Depth</label><input type="number" id="wave-minDepth" value="1" step="0.25"></div>
                            <div><label>Max Depth</label><input type="number" id="wave-maxDepth" value="5" step="0.25"></div>
                            <div><label>Step</label><input type="number" id="wave-depthStep" value="1" step="0.125"></div>
                        </div>
                    </div>
                </div>

                <!-- Ripple Settings -->
                <div id="settings-ripple" style="display: none;">
                    <div id="ripple-layers-container"></div>
                    <button id="add-ripple-layer">+ Add Ripple Layer</button>
                    <div class="config-card">
                        <div class="config-card-grid grid-3">
                            <div><label>Min Depth</label><input type="number" id="ripple-minDepth" value="1" step="0.25"></div>
                            <div><label>Max Depth</label><input type="number" id="ripple-maxDepth" value="5" step="0.25"></div>
                            <div><label>Step</label><input type="number" id="ripple-depthStep" value="1" step="0.125"></div>
                        </div>
                    </div>
                </div>

                <!-- Parametric Settings -->
                <div id="settings-parametric" style="display: none;">
                    <div class="config-card">
                        <div class="config-card-grid grid-3">
                            <div><label>Orientation</label>
                                <select id="parametric-orientation">
                                    <option value="vertical" selected>Vertical</option>
                                    <option value="horizontal">Horizontal</option>
                                </select>
                            </div>
                            <div><label>Spacing (in)</label><input type="number" id="parametric-spacing" value="0" step="0.1" min="0"></div>
                            <div></div>
                        </div>
                    </div>

                    <label>Wave Components:</label>
                    <div id="parametric-layers-container"></div>
                    <button id="add-parametric-wave-layer">+ Add Wave Component</button>

                    <div class="config-card">
                        <label>Noise Amount: <span id="noise-amount-val">0</span></label>
                        <input type="range" id="parametric-noise-slider" min="0" max="1" step="0.05" value="0">
                    </div>
                </div>
            </div>

            <div class="control-group">
                <h3>Appearance</h3>
                
                <label>Background Color:
                    <div class="color-swatch-wrapper">
                        <div id="bg-color-swatch" class="color-swatch" style="background-color: #1a1a1a;">
                            <input type="color" id="bg-color-picker" value="#1a1a1a">
                        </div>
                    </div>
                </label>

                <label>Color Layout Type:
                    <select id="color-layout-type">
                        <option value="random" selected>Random</option>
                        <option value="wave">Wave</option>
                        <option value="ripple">Ripple</option>
                        <option value="paint">Paint (Manual)</option>
                    </select>
                </label>

                <label style="display: flex; align-items: center; gap: 0.5rem; margin: 0.5rem 0;">
                    <input type="checkbox" id="sync-color-layout" style="width: auto; margin: 0;"> Sync with Block Layout
                </label>

                <div class="config-card">
                    <label>Preview Lighting</label>
                    <div class="config-card-grid grid-3">
                        <div><label>Intensity</label><input type="range" id="light-intensity" min="0" max="2" step="0.1" value="1.2"></div>
                        <div><label>Angle</label><input type="range" id="light-angle" min="0" max="360" step="1" value="45"></div>
                        <div><label>Ambient</label><input type="range" id="light-ambient" min="0" max="1" step="0.1" value="0.4"></div>
                    </div>
                </div>

                <div id="settings-color-paint" style="display: none;">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.5rem;">
                        <button id="btn-paint-mode" class="secondary">Enable painting</button>
                        <button id="btn-paint-all">Paint All</button>
                    </div>
                    <label>Brush Palette:</label>
                    <div id="brush-colors-list" style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.25rem;"></div>
                    <button id="add-brush-color" style="width: auto; padding: 0.4rem 0.8rem; margin-top: 0.5rem; font-size: 0.8rem;">+ Add Brush</button>
                </div>

                <div id="settings-color-random">
                    <div id="color-configs-container"></div>
                    <button id="add-color-config">+ Add Color Type</button>
                    <div id="color-validation-message" style="color: red; font-size: 0.8rem; margin-top: 0.5rem;"></div>
                </div>

                <div id="settings-color-wave" style="display: none;">
                    <label>Wave Colors:</label>
                    <div id="color-wave-palette" style="display: flex; gap: 0.2rem; flex-wrap: wrap; margin-bottom: 0.5rem;"></div>
                    <button id="add-color-wave-palette-color" style="width: auto; padding: 0.3rem 0.6rem; font-size: 0.75rem; margin-bottom: 1rem;">+ Add Color</button>
                    <label>Wave Layers:</label>
                    <div id="color-wave-layers-container"></div>
                    <button id="add-color-wave-layer">+ Add Color Wave Layer</button>
                </div>

                <div id="settings-color-ripple" style="display: none;">
                    <label>Ripple Colors:</label>
                    <div id="color-ripple-palette" style="display: flex; gap: 0.2rem; flex-wrap: wrap; margin-bottom: 0.5rem;"></div>
                    <button id="add-color-ripple-palette-color" style="width: auto; padding: 0.3rem 0.6rem; font-size: 0.75rem; margin-bottom: 1rem;">+ Add Color</button>
                    <label>Ripple Layers:</label>
                    <div id="color-ripple-layers-container"></div>
                    <button id="add-color-ripple-layer">+ Add Color Ripple Layer</button>
                </div>
            </div>

            <div class="action-buttons">
                <button id="btn-export" class="primary">Export JSON</button>
                <button id="btn-load">Load JSON</button>
                <input type="file" id="input-load" accept=".json" style="display: none;">
                <button id="btn-undo">Undo (Ctrl+Z)</button>
                <button id="btn-ar" class="secondary desktop-only">View in Your Space (AR)</button>
            </div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js');
            });
        }
    </script>
</body>
</html>
